services:
  postgres:
    image: postgres:17-alpine
    container_name: i8sl-postgres
    environment:
      POSTGRES_DB: i8sl
      POSTGRES_USER: i8sl
      POSTGRES_PASSWORD: i8sl
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U i8sl -d i8sl"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  i8sl:
    build:
      context: ..
      dockerfile: build/package/Dockerfile
    container_name: i8sl
    ports:
      - "8080:8080"
    environment:
      I8SL_HTTP_ADDR: ":8080"
      I8SL_BASE_URL: "http://localhost:8080"
      I8SL_STORAGE_DRIVER: "postgres"
      I8SL_DB_URI: "postgres://i8sl:i8sl@postgres:5432/i8sl?sslmode=disable"
      I8SL_CODE_LENGTH: "7"
      I8SL_GENERATION_RATE_PER_MINUTE: "30"
      I8SL_GENERATION_BURST: "10"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/health/ready >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  postgres-data:
